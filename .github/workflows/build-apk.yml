name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Build Debug APK
        run: |
          cd android
          gradle assembleDebug

      - name: Copy APK to download folder
        run: |
          mkdir -p download
          cp android/app/build/outputs/apk/debug/app-debug.apk download/sopi-tools.apk

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add download/sopi-tools.apk
          git diff --cached --quiet || git commit -m "build: auto-generate APK [skip ci]"
          git push -u origin main
